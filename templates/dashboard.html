<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoSign 控制台</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body class="dashboard-page">
  <a class="skip-link" href="#main-content">跳到主要内容</a>

  <header class="card topbar">
    <div class="topbar-main">
      <h1>课程签到</h1>
      <p class="topbar-meta">{{ user_name }}（{{ student_id }}） · {% if use_vpn %}VPN{% else %}直连{% endif %}</p>
    </div>
    <div class="topbar-actions">
      <button id="refreshBtn" class="btn primary" type="button">刷新课程</button>
      <button id="logoutBtn" class="btn" type="button">退出</button>
    </div>
  </header>

  <div id="systemMessage" class="alert info hidden" role="status" aria-live="polite" aria-atomic="true"></div>

  <main id="main-content" class="layout" tabindex="-1">
    <section class="card" aria-labelledby="course-section-title">
      <div class="section-head">
        <h2 id="course-section-title">本周课程</h2>
      </div>

      <div class="stats" aria-live="polite" aria-atomic="true">
        <article class="stat-card">
          <p class="stat-label">本周课程</p>
          <p id="statTotal" class="stat-value">0</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">今日课程</p>
          <p id="statToday" class="stat-value">0</p>
        </article>
        <article class="stat-card stat-card-warning">
          <p class="stat-label">待签到</p>
          <p id="statPending" class="stat-value">0</p>
        </article>
      </div>

      <table class="table" id="weekTable">
        <caption class="sr-only">本周课程列表，包含上课时间、课程信息、出勤状态与签到操作</caption>
        <thead>
          <tr>
            <th scope="col">日期</th>
            <th scope="col">时间</th>
            <th scope="col">距签到</th>
            <th scope="col">课程</th>
            <th scope="col">出勤状态</th>
            <th scope="col">操作</th>
          </tr>
        </thead>
        <tbody id="weekBody"></tbody>
      </table>
      <p id="emptyHint" class="muted hidden" role="status">本周暂无课程数据。</p>
    </section>

    <section class="card" aria-labelledby="event-section-title">
      <details class="log-panel" open>
        <summary id="event-section-title">运行日志</summary>
        <ul id="eventList" class="event-list" aria-live="polite" aria-atomic="false"></ul>
      </details>
    </section>
  </main>

  <div
    id="promptModal"
    class="modal hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="promptTitle"
    aria-describedby="promptText"
    tabindex="-1"
  >
    <div class="modal-card">
      <h3 id="promptTitle">即将开始</h3>
      <p id="promptText"></p>
      <div class="modal-actions">
        <button id="promptNo" class="btn" type="button">暂不签到</button>
        <button id="promptYes" class="btn primary" type="button">立即签到</button>
      </div>
    </div>
  </div>

  <script>
    window.__AUTOSIGN__ = {
      studentId: {{ student_id|tojson }},
      userName: {{ user_name|tojson }}
    };
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
