<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AutoSign Icon</title>
  <desc id="desc">Premium calendar shield icon for AutoSign.</desc>

  <defs>
    <linearGradient id="g-bg" x1="48" y1="24" x2="464" y2="488" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="g-card" x1="122" y1="94" x2="390" y2="414" gradientUnits="userSpaceOnUse">
